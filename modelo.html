  <head>
    <!-- INFORME ABAIXO O NOME DA PAGINA, AQUELE QUE IRA APARECER NA PARTE SUPERIOR DA ABA -->
    <title>Trufos - [NOME_DA_PÁGINA]</title>

    <!-- ==========================================================================
                GOOGLE ANALYTICS (NAO ALTERAR)
    =========================================================================== -->
    <script>
      (function () {
        // 1. Definição das condições de bloqueio:
        // - Se o endereço for localhost ou 127.0.0.1 (Live Server)
        // - Se a URL contiver "?teste=true" (Para você usar no celular)
        const isLocal =
          window.location.hostname === "localhost" ||
          window.location.hostname === "127.0.0.1";
        const isTestMode = window.location.search.includes("teste=true");

        if (!isLocal && !isTestMode) {
          // Se NÃO for teste, carrega o script externo do Google
          const script = document.createElement("script");
          script.async = true;
          script.src =
            "https://www.googletagmanager.com/gtag/js?id=G-ENVZ0TNVJK";
          document.head.appendChild(script);

          // Configuração padrão do GA
          window.dataLayer = window.dataLayer || [];
          function gtag() {
            dataLayer.push(arguments);
          }
          gtag("js", new Date());
          gtag("config", "G-ENVZ0TNVJK");
        } else {
          console.log("Analytics bloqueado: Ambiente de teste detectado.");
        }
      })();
    </script>

    <!-- ==========================================================================
                SCRIPT DE CONGURACAO DO SITE (CABECALHO, RODAPE, MENU E FORMATACAO)
    =========================================================================== -->
    <script src="/js/componentes.js"></script>
  </head>
