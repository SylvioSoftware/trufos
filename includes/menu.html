<script>
  // Aguarda o menu carregar
  setTimeout(() => {
    const linksPai = document.querySelectorAll(".link-pai");

    linksPai.forEach((item) => {
      item.addEventListener("click", function (e) {
        if (window.innerWidth <= 768) {
          const submenu = this.nextElementSibling;
          const isVisible = submenu.style.display === "block";

          // Se o menu está fechado, abre e bloqueia o link
          if (!isVisible) {
            e.preventDefault();
            // Fecha outros menus abertos antes de abrir este
            document
              .querySelectorAll(".dropdown")
              .forEach((d) => (d.style.display = "none"));
            submenu.style.display = "block";
          }
          // Se o menu já está aberto e você clica de novo:
          else {
            // Opção A: Se quiser que ele FECHE ao clicar de novo:
            // e.preventDefault();
            // submenu.style.display = 'none';
            // Opção B: Se quiser que ele SIGA O LINK (ir para a página geral):
            // Não fazemos nada, o navegador segue o href normalmente.
          }
        }
      });
    });

    // Fecha o menu se clicar em qualquer outro lugar da tela
    document.addEventListener("click", function (e) {
      if (!e.target.closest(".dropdown") && !e.target.closest(".link-pai")) {
        document
          .querySelectorAll(".dropdown")
          .forEach((d) => (d.style.display = "none"));
      }
    });
  }, 500);
</script>
